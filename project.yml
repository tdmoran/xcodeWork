name: ENTExaminer
options:
  bundleIdPrefix: com.entexaminer
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true
    DEAD_CODE_STRIPPING: true
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
      GCC_PREPROCESSOR_DEFINITIONS: "DEBUG=1"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: wholemodule
      GCC_PREPROCESSOR_DEFINITIONS: ""

schemes:
  ENTExaminer:
    build:
      targets:
        ENTExaminer: all
    run:
      config: Debug
      environmentVariables:
        - variable: DYLD_PRINT_STATISTICS
          value: "0"
          isEnabled: false
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: ENTExaminerTests
          parallelizable: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  ENTExaminer:
    type: application
    platform: macOS
    sources:
      - path: ENTExaminer
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.entexaminer.app
        PRODUCT_NAME: ENTExaminer
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "ENTExaminer needs microphone access for voice examination"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.education"
        INFOPLIST_KEY_CFBundleDisplayName: "ENT Examiner"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2024 ENTExaminer. All rights reserved."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "ENTExaminer uses speech recognition to transcribe your answers"
        CODE_SIGN_ENTITLEMENTS: ENTExaminer/ENTExaminer.entitlements
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        COMBINE_HIDPI_IMAGES: true
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_IDENTITY: "-"
    entitlements:
      path: ENTExaminer/ENTExaminer.entitlements

  ENTExaminerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ENTExaminerTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: ENTExaminer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.entexaminer.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ENTExaminer.app/Contents/MacOS/ENTExaminer"
        BUNDLE_LOADER: "$(TEST_HOST)"
